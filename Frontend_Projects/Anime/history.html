<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch History - AnimeStream</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            padding: 100px 2rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .page-title {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }
        .history-item {
            display: flex;
            gap: 1.5rem;
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 1rem;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform var(--transition-speed);
            cursor: pointer;
        }
        .history-item:hover {
            transform: translateX(10px);
            border-color: rgba(255,51,102,0.3);
        }
        .history-img {
            width: 160px;
            height: 90px;
            border-radius: 8px;
            object-fit: cover;
        }
        .history-details {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
        }
        .history-title {
            font-size: 1.25rem;
            margin-bottom: 0.25rem;
        }
        .history-meta {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--bg-main);
            border-radius: 2px;
            overflow: hidden;
            margin-top: auto;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 2px;
        }
        @media (max-width: 768px) {
            .history-item { flex-direction: column; }
            .history-img { width: 100%; height: 180px; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Anime<span>Stream</span></a>
            <div class="nav-menu" id="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="browse.html" class="nav-link">Browse</a>
                <a href="trending.html" class="nav-link">Trending</a>
                <a href="my-list.html" class="nav-link">My List</a>
            </div>
            <div class="nav-actions">
                <div class="search-container">
                    <input type="text" placeholder="Search anime..." class="search-input" id="search-input">
                    <button class="icon-btn search-btn" id="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
                <div class="profile-dropdown active" id="profile-dropdown">
                    <img src="https://i.pravatar.cc/150?img=12" alt="User Profile" class="profile-avatar" id="profile-btn">
                    <div class="dropdown-content">
                        <a href="profile.html"><i class="fa-regular fa-user"></i> Profile</a>
                        <a href="history.html"><i class="fa-solid fa-clock-rotate-left"></i> History</a>
                        <a href="favorites.html"><i class="fa-regular fa-heart"></i> Favorites</a>
                        <div class="divider"></div>
                        <a href="login.html" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
                    </div>
                </div>
                <button class="icon-btn menu-toggle" id="mobile-menu-btn">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <main>
        <div class="page-header">
            <h1 class="page-title"><i class="fa-solid fa-clock-rotate-left"></i> Watch History</h1>
            <p class="page-desc">Pick up right where you left off.</p>
        </div>

        <div class="history-list">
            <!-- Item 1 -->
            <div class="history-item">
                <img src="https://images.unsplash.com/photo-1623126908029-58cb08a2b272?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="Thumbnail" class="history-img">
                <div class="history-details">
                    <h3 class="history-title">Samurai Spirits</h3>
                    <div class="history-meta">Episode 12 • Watched Today</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: 75%;"></div></div>
                </div>
            </div>
            
            <!-- Item 2 -->
            <div class="history-item">
                <img src="https://images.unsplash.com/photo-1542662565-7e4fd182875b?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="Thumbnail" class="history-img">
                <div class="history-details">
                    <h3 class="history-title">Cyber City</h3>
                    <div class="history-meta">Episode 3 • Watched Yesterday</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: 20%;"></div></div>
                </div>
            </div>
            
             <!-- Item 3 -->
             <div class="history-item">
                <img src="https://images.unsplash.com/photo-1601645191163-3fc0d5d64e35?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="Thumbnail" class="history-img">
                <div class="history-details">
                    <h3 class="history-title">Project: Omega</h3>
                    <div class="history-meta">Episode 24 (Finale) • Watched Oct 12</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: 100%;"></div></div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
