<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AnimeStream</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 2rem;
        }
        .auth-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }
        .auth-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(10,10,15,0.7), rgba(10,10,15,0.98));
            z-index: -1;
        }
        .auth-card {
            background: rgba(28, 28, 40, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem 2.5rem;
            border-radius: var(--border-radius);
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-md);
            animation: fadeUp 0.6s ease-out;
        }
        .auth-title {
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        .auth-form .form-group {
            margin-bottom: 1.5rem;
        }
        .auth-form .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .auth-form .form-input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: border-color var(--transition-speed);
        }
        .auth-form .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        .auth-btn {
            width: 100%;
            padding: 0.8rem;
            margin-top: 1rem;
            justify-content: center;
        }
        .auth-links {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .auth-links a {
            color: var(--text-main);
            font-weight: 600;
        }
        .auth-links a:hover {
            color: var(--accent-primary);
        }
        .simple-nav {
            position: absolute;
            top: 2rem;
            left: 2rem;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Cinematic dark style background -->
        <img src="https://images.unsplash.com/photo-1542662565-7e4fd182875b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80" alt="Background" class="auth-bg">
        <div class="auth-overlay"></div>
        
        <div class="simple-nav">
            <a href="index.html" class="logo">Anime<span>Stream</span></a>
        </div>

        <div class="auth-card">
            <h1 class="auth-title">Create Account</h1>
            <form action="index.html" class="auth-form">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" placeholder="Create a password" required>
                </div>
                <button type="button" onclick="window.location.href='index.html'" class="btn btn-primary auth-btn">Sign Up</button>
            </form>
            <div class="auth-links">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </div>
    </div>
</body>
</html>
