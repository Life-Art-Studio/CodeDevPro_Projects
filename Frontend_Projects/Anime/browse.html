<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Anime - AnimeStream</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header {
            padding: 100px 2rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .page-title {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .filter-select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
        }
        .filter-select option {
            background: var(--bg-card);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Anime<span>Stream</span></a>
            <div class="nav-menu" id="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="browse.html" class="nav-link active">Browse</a>
                <a href="trending.html" class="nav-link">Trending</a>
                <a href="my-list.html" class="nav-link">My List</a>
            </div>
            <div class="nav-actions">
                <div class="search-container">
                    <input type="text" placeholder="Search anime..." class="search-input" id="search-input">
                    <button class="icon-btn search-btn" id="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
                <div class="profile-dropdown" id="profile-dropdown">
                    <img src="https://i.pravatar.cc/150?img=12" alt="User Profile" class="profile-avatar" id="profile-btn">
                    <div class="dropdown-content">
                        <a href="profile.html"><i class="fa-regular fa-user"></i> Profile</a>
                        <a href="history.html"><i class="fa-solid fa-clock-rotate-left"></i> History</a>
                        <a href="favorites.html"><i class="fa-regular fa-heart"></i> Favorites</a>
                        <div class="divider"></div>
                        <a href="login.html" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
                    </div>
                </div>
                <button class="icon-btn menu-toggle" id="mobile-menu-btn">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <main>
        <div class="page-header">
            <h1 class="page-title">Browse Anime</h1>
            <div class="filter-bar">
                <select class="filter-select">
                    <option value="">All Genres</option>
                    <option value="action">Action</option>
                    <option value="scifi">Sci-Fi</option>
                    <option value="romance">Romance</option>
                </select>
                <select class="filter-select">
                    <option value="">Any Year</option>
                    <option value="2026">2026</option>
                    <option value="2025">2025</option>
                </select>
                <select class="filter-select">
                    <option value="popular">Most Popular</option>
                    <option value="newest">Newest</option>
                    <option value="rating">Highest Rated</option>
                </select>
            </div>
        </div>

        <section class="content-section" style="padding-top: 0;">
            <div class="anime-grid">
                
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 AnimeStream. All rights reserved.</p>
        </div>
    </footer>
    <script src="app.js" type="module" defer></script>
</body>
</html>
