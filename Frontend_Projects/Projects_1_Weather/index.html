<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="app.js" defer></script>
    <title>Weather By CodeDevPro</title>
  </head>
  <body>
    <video autoplay loop muted plasysinline>
      <source src="bg1.webm" type="video/webm">
    </video>
    <div class="app-container">
      <div class="sec">
        <div class="search">
            <i class="fa-solid fa-location-dot"></i>
          <input class="input-city" type="text" placeholder="Enter Your City" />
        </div>
        <div class="container">
          <div class="temp">
            <h2 id="city-name"></h2>
            <h1 id="main-temp">&deg;</h1>
            <h2 id="description">Rainy Day</h2>
          </div>
          <div class="temp-details">
            <div class="feels-like">
              <h4>Feels Like</h4>
              <h3 id="feels-like">30&deg;</h3>
            </div>
            <div class="pressure">
              <h4>PRESSURE</h4>
              <h3 id="pressure">2.3"</h3>
              <p>in last 24h</p>
            </div>
            <div class="visibility">
              <h4>VISIBILITY</h4>
              <h3 id="visibility">6 mi</h3>
            </div>
            <div class="humidity">
              <h4>HUMIDITY</h4>
              <h3 id="humidity">82%</h3>
            </div>
             <div class="wind-speed">
              <h4>WIND SPEED</h4>
              <h3 id="wind-speed"></h3>
            </div>
            <div class="temp-min-max">
              <h4>TEMP MIN MAX</h4>
              <h3 id="temp-min-max"></h3>
            </div>
          </div>
        </div>
      </div>
      
    </div>
    <footer>
        <h3>Made By CodeDevPro</h3>
      </footer>
  </body>
  
</html>
