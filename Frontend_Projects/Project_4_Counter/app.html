<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
    <title>Counter By CodeDevPro</title>
  </head>
  <body>
    <div class="app-container">
      <header>
        <h1>Counter</h1>
      </header>
      <div id="counter"><h1>0</h1></div>
      <div class="btns">
        <button id="minus-btn">-</button>
        <button id="add-btn">+</button>
      </div>
      <div class="increase-decrease">
        <span
          >Increase/Decrease by:
          <input min="1" id="input-counter" type="number" value="1"
        /></span>
      </div>
      <div class="reset">
        <button id="reset">Reset</button>
      </div>
    </div>
    <footer><h1>Made by CodeDevPro</h1></footer>
  </body>
</html>
