<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
    <title>String Transformer</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>String Transformer</h1>
      </header>
      <div class="input-container">
        <input
          id="input"
          type="text"
          required
          value="this is normal sentence to transform"
        />
      </div>
      <p>Type any text to see it transformed in different formats below</p>
      <div>
        <h5>LOWER CASE</h5>
        <span id="lower-case"></span>
      </div>
      <div>
        <h5>UPPER CASE</h5>
        <span id="upper-case"></span>
      </div>
      <div>
        <h5>CAMEL CASE</h5>
        <span id="camel-case"></span>
      </div>
      <div>
        <h5>PASCAL CASE</h5>
        <span id="pascal-case"></span>
      </div>
      <div>
        <h5>SNAKE CASE</h5>
        <span id="snake-case"></span>
      </div>
      <div>
        <h5>KEBAB CASE</h5>
        <span id="kebab-case"></span>
      </div>
      <div>
        <h5>TRIM SPACES</h5>
        <span id="trim-spaces"></span>
      </div>
    </div>
  </body>
</html>
