    <script type="module" src="app.js" defer></script>
    <title>Reminder Notes</title>
</head>

<body>
    <div class="container">
        <button id="add-note-btn" title="New Note" class="new-note"><i class="fa-solid fa-plus"></i></button>
        <h1 class="glitch" data-text="Reminder Notes">Reminder Notes</h1>
        <form id="note-form">

            <!-- TITLE -->
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="Enter reminder title" required>
            </div>


            <!-- NOTE -->
            <div class="form-group">
                <label for="note">Reason</label>
                <textarea id="note" name="note" placeholder="Enter reason" required></textarea>
            </div>


            <!-- REQUIREMENT / PRIORITY -->
            <div class="form-group">
                <label>Priority</label>

                <label>
                    <input type="radio" name="type" value="normal" checked>
                    Normal
                </label>

                <label>
                    <input type="radio" name="type" value="important">
                    Important
                </label>

                <label>
                    <input type="radio" name="type" value="urgent">
                    Urgent
                </label>

            </div>


            <!-- DATE -->
            <div class="form-group">
                <label for="date">Reminder Date</label>
                <input type="date" id="date" name="date" required>
            </div>





            <button type="submit">Add Reminder</button>

        </form>
