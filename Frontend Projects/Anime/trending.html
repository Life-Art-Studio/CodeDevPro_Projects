<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trending Anime - AnimeStream</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      .page-header {
        padding: 100px 2rem 2rem;
        max-width: 1400px;
        margin: 0 auto;
        text-align: center;
      }
      .page-title {
        font-size: 3rem;
        margin-bottom: 0.5rem;
        background: var(--accent-gradient);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .page-desc {
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar scrolled" id="navbar">
      <div class="nav-container">
        <a href="index.html" class="logo">Anime<span>Stream</span></a>
        <div class="nav-menu" id="nav-menu">
          <a href="index.html" class="nav-link">Home</a>
          <a href="browse.html" class="nav-link">Browse</a>
          <a href="trending.html" class="nav-link active">Trending</a>
          <a href="my-list.html" class="nav-link">My List</a>
        </div>
        <div class="nav-actions">
          <div class="search-container">
            <input
              type="text"
              placeholder="Search anime..."
              class="search-input"
              id="search-input"
            />
            <button class="icon-btn search-btn" id="search-btn">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
          <div class="profile-dropdown" id="profile-dropdown">
            <img
              src="https://i.pravatar.cc/150?img=12"
              alt="User Profile"
              class="profile-avatar"
              id="profile-btn"
            />
            <div class="dropdown-content">
              <a href="profile.html"
                ><i class="fa-regular fa-user"></i> Profile</a
              >
              <a href="history.html"
                ><i class="fa-solid fa-clock-rotate-left"></i> History</a
              >
              <a href="favorites.html"
                ><i class="fa-regular fa-heart"></i> Favorites</a
              >
              <div class="divider"></div>
              <a href="login.html" class="logout-link"
                ><i class="fa-solid fa-right-from-bracket"></i> Logout</a
              >
            </div>
          </div>
          <button class="icon-btn menu-toggle" id="mobile-menu-btn">
            <i class="fa-solid fa-bars"></i>
          </button>
        </div>
      </div>
    </nav>

    <main>
      <div class="page-header">
        <h1 class="page-title">
          <i class="fa-solid fa-fire"></i> Trending This Week
        </h1>
        <p class="page-desc">
          The most popular shows everyone is watching right now.
        </p>
      </div>

      <section class="content-section" style="padding-top: 0">
        <div class="anime-grid">
         
         
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-bottom">
        <p>&copy; 2026 AnimeStream. All rights reserved.</p>
      </div>
    </footer>
   <script src="app.js" type="module" defer></script>
  </body>
</html>
