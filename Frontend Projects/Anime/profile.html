<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - AnimeStream</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 100px auto 4rem;
            padding: 2rem;
            background: var(--bg-card);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .profile-avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-primary);
            box-shadow: var(--shadow-glow);
        }
        .profile-info h1 {
            font-size: 2rem;
            margin-bottom: 0.25rem;
        }
        .profile-info p {
            color: var(--text-muted);
            margin-bottom: 1rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px;
            font-size: 1rem;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Anime<span>Stream</span></a>
            <div class="nav-menu" id="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="browse.html" class="nav-link">Browse</a>
                <a href="trending.html" class="nav-link">Trending</a>
                <a href="my-list.html" class="nav-link">My List</a>
            </div>
            <div class="nav-actions">
                <div class="search-container">
                    <input type="text" placeholder="Search anime..." class="search-input" id="search-input">
                    <button class="icon-btn search-btn" id="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
                <div class="profile-dropdown active" id="profile-dropdown">
                    <img src="https://i.pravatar.cc/150?img=12" alt="User Profile" class="profile-avatar" id="profile-btn">
                    <div class="dropdown-content">
                        <a href="profile.html"><i class="fa-regular fa-user"></i> Profile</a>
                        <a href="history.html"><i class="fa-solid fa-clock-rotate-left"></i> History</a>
                        <a href="favorites.html"><i class="fa-regular fa-heart"></i> Favorites</a>
                        <div class="divider"></div>
                        <a href="login.html" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
                    </div>
                </div>
                <button class="icon-btn menu-toggle" id="mobile-menu-btn">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <main>
        <div class="profile-container">
            <div class="profile-header">
                <img src="https://i.pravatar.cc/150?img=12" alt="Profile" class="profile-avatar-large">
                <div class="profile-info">
                    <h1>OtakuViewer99</h1>
                    <p>viewer99@example.com <br> Member since March 2026</p>
                    <button class="btn btn-secondary">Change Avatar</button>
                </div>
            </div>
            
            <form>
                <div class="form-group">
                    <label class="form-label">Display Name</label>
                    <input type="text" class="form-input" value="OtakuViewer99">
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" value="viewer99@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" placeholder="••••••••">
                </div>
                <button type="button" class="btn btn-primary">Save Changes</button>
            </form>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
