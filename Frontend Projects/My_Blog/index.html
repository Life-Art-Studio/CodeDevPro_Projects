<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alex Sterling | Future Journalism</title>
    <meta name="description" content="Personal blog of Alex Sterling" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="loading">
    <!-- Futuristic Loader -->
    <div id="loader">
      <div class="scanner"></div>
      <div class="loading-text">INITIALIZING SYSTEM...</div>
    </div>

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <div class="scanlines"></div>
    <!-- Sky Mode: Cloud Background -->
    <div id="clouds">
      <div class="cloud x1"></div>
      <div class="cloud x2"></div>
      <div class="cloud x3"></div>
      <div class="cloud x4"></div>
    </div>
    <!-- CRT Effect overlay -->

    <header class="site-header">
      <div class="container">
        <a href="index.html" class="logo glitch" data-text="A.S.">A.S.</a>
        <nav class="main-nav">
          <ul>
            <li>
              <a href="#featured" class="nav-link" data-text="TRANSMISSIONS"
                >TRANSMISSIONS</a
              >
            </li>
            <li>
              <a href="about.html" class="nav-link" data-text="IDENTITY"
                >IDENTITY</a
              >
            </li>
          </ul>
        </nav>
        <div style="display: flex; align-items: center; gap: 10px">
          <button class="theme-toggle" aria-label="Toggle Theme">
            <svg
              class="sun-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg
              class="moon-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
          <div class="mobile-menu-btn">
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container relative">
          <div class="hero-content" id="hero-content">
            <!-- Dynamic Hero Content injected here -->
          </div>
          <!-- Decorative Elements -->
          <div class="cyber-grid"></div>
        </div>
      </section>

      <!-- SERVICES SECTION -->
      <section id="services" class="section-padding">
        <div class="container">
          <div class="section-header">
            <h2 class="glitch-header" data-text="MAINFRAME_MODULES">
              MAINFRAME_MODULES
            </h2>
            <div class="line-deco"></div>
          </div>
          <div class="service-grid" id="services-grid">
            <!-- Dynamic Services -->
          </div>
        </div>
      </section>

      <!-- PROCESS SECTION -->
      <section id="process" class="section-padding">
        <div class="container">
          <div class="section-header">
            <h2 class="glitch-header" data-text="ALGORITHMIC_FLOW">
              ALGORITHMIC_FLOW
            </h2>
            <div class="line-deco"></div>
          </div>
          <div class="process-timeline" id="process-timeline">
            <!-- Dynamic Process -->
          </div>
        </div>
      </section>

      <!-- TESTIMONIALS SECTION -->
      <section id="testimonials" class="section-padding">
        <div class="container">
          <div class="section-header">
            <h2 class="glitch-header" data-text="ENCRYPTED_FEEDBACK">
              ENCRYPTED_FEEDBACK
            </h2>
            <div class="line-deco"></div>
          </div>
          <div class="testimonials-grid" id="testimonials-grid">
            <!-- Dynamic Testimonials -->
          </div>
        </div>
      </section>

      <section id="featured" class="featured-section">
        <div class="container">
          <div class="section-header">
            <h2 class="glitch-header" data-text="RECENT_LOGS">RECENT_LOGS</h2>
            <div class="line-deco"></div>
          </div>
          <div class="grid" id="posts-grid">
            <!-- Dynamic Articles injected here -->
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-bottom">
          <p>
            &copy; <span id="year">2026</span>
            <span class="accent-text">ALEX STERLING</span>. SYSTEM ONLINE.
          </p>
        </div>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
