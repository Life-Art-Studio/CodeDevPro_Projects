<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanilla JS Kanban Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <!-- Background glowing orbs -->
  <div class="background-animation">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
  </div>

  <div class="app-container">
    <button id="themeToggleBtn">🌙</button>
    <header class="header">
      <h1 class="logo-text">
        <span class="logo-icon">✨</span> Task Master <span class="highlight">Pro</span>
      </h1>
      <div class="add-task-container">
        <div class="input-wrapper">
          <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off">
        </div>
        <button id="addTaskBtn" class="primary-btn">
          <span class="btn-text">Add Task</span>
          <span class="btn-icon">+</span>
        </button>
        
      </div>
      <input type="text" id="searchInput" placeholder="🔍 Search tasks...">
      <button id="sortBtn">Sort Date Wise</button>
    </header>

    <main class="board">
      <section class="column" id="todo-column">
        <div class="column-header">
          <h2 class="column-title todo-title">
            <span class="status-dot"></span> To Do
          </h2>
        </div>
        <div class="task-list" id="todo-list">
        </div>
      </section>

      <section class="column" id="progress-column">
        <div class="column-header">
          <h2 class="column-title progress-title">
            <span class="status-dot"></span> In Progress
          </h2>
        </div>
        <div class="task-list" id="progress-list"></div>
      </section>

      <section class="column" id="done-column">
        <div class="column-header">
          <h2 class="column-title done-title">
            <span class="status-dot"></span> Done
          </h2>
        </div>
        <div class="task-list" id="done-list"></div>
      </section>
    </main>
    
    <footer class="app-footer">
      <p>&copy; 2026 Developed with ❤️ by <span class="highlight">CodeDevPro</span></p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
